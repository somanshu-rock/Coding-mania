function renderCourses(filter = 'all') {
  const grid = document.getElementById('courses-grid');
  const filtered = filter === 'all' ? courses : courses.filter(c => c.category === filter);
  grid.innerHTML = filtered.map(c => `
    <div class="course-card" data-category="${c.category}">
      <div class="card-img-wrap">
        <img src="${c.img}" alt="${c.alt}" loading="lazy">
        ${c.badge ? `<div class="card-badge ${c.badge}">${c.badgeLabel}</div>` : ''}
        <div class="card-rating">★ ${c.rating}</div>
      </div>
      <div class="card-body">
        <div class="card-category">${c.categoryLabel}</div>
        <div class="card-title">${c.title}</div>
        <div class="card-desc">${c.desc}</div>
        <div class="card-meta">
          <div class="meta-item"><span class="meta-icon">🕐</span>${c.duration}</div>
          <div class="meta-item"><span class="meta-icon">📖</span>${c.lessons}</div>
        </div>
        <div class="card-footer">
          <div class="card-price">₹${c.price.toLocaleString('en-IN')}<span>₹${c.origPrice.toLocaleString('en-IN')}</span></div>
          <button class="enroll-btn" onclick="openModal(${c.id})">Enroll Now →</button>
        </div>
      </div>
    </div>
  `).join('');
}

function filterCourses(filter, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderCourses(filter);
}

let currentCourse = null;

function openModal(courseId) {
  currentCourse = courses.find(c => c.id === courseId);
  if (!currentCourse) return;
  document.getElementById('modal-course-title').textContent = currentCourse.title;
  document.getElementById('modal-course-price').textContent = '₹' + currentCourse.price.toLocaleString('en-IN');
  document.getElementById('modal-category').textContent = currentCourse.categoryLabel;
  document.getElementById('field-course').value = currentCourse.title;
  document.getElementById('field-price').value = '₹' + currentCourse.price.toLocaleString('en-IN');
  document.getElementById('field-category').value = currentCourse.categoryLabel;
  document.getElementById('email-subject').value = 'New Enrollment — ' + currentCourse.title + ' | Coursaga';
  document.getElementById('field-summary').value =
    '== COURSAGA ENROLLMENT REQUEST ==\n' +
    'Course: ' + currentCourse.title + '\n' +
    'Category: ' + currentCourse.categoryLabel + '\n' +
    'Price: ₹' + currentCourse.price.toLocaleString('en-IN') + '\n' +
    'Original Price: ₹' + currentCourse.origPrice.toLocaleString('en-IN') + '\n' +
    '================================\n' +
    'Please follow up with the student on WhatsApp to confirm payment & share access.';
  document.getElementById('form-container').style.display = 'block';
  document.getElementById('success-box').classList.remove('show');
  document.getElementById('enroll-form').reset();
  document.getElementById('modal-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal(event, force) {
  if (force || (event && event.target === document.getElementById('modal-overlay'))) {
    document.getElementById('modal-overlay').classList.remove('open');
    document.body.style.overflow = '';
  }
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal(null, true);
});

document.getElementById('enroll-form').addEventListener('submit', async function(e) {
  e.preventDefault();
  const btn = document.getElementById('submit-btn');
  btn.textContent = '⏳ Sending...';
  btn.disabled = true;
  const formData = new FormData(this);
  try {
    const response = await fetch(this.action, {
      method: 'POST',
      body: formData,
      headers: { 'Accept': 'application/json' }
    });
    if (response.ok) {
      document.getElementById('form-container').style.display = 'none';
      document.getElementById('success-box').classList.add('show');
    } else {
      throw new Error('Failed');
    }
  } catch (err) {
    btn.textContent = '🎓 Submit Enrollment Request';
    btn.disabled = false;
    alert('⚠️ Could not send. Please WhatsApp us at +91 62909 57563 to enroll directly!');
  }
});

renderCourses('all');
