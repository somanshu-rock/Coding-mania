<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coursaga — Learn. Grow. Succeed.</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap');
</style>
    --cream: #faf7f2;
    --gold: #c9933a;
    --gold-light: #e8b563;
    --teal: #1a6b6b;
    --teal-light: #2a9090;
    --accent: #e85d26;
    --card-bg: #ffffff;
    --muted: #6b7280;
    --border: #e8e2d9;
    --shadow: 0 4px 24px rgba(0,0,0,0.08);
    --shadow-hover: 0 12px 40px rgba(0,0,0,0.15);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--ink);
    overflow-x: hidden;
  }

  /* ===== HEADER ===== */
  header {
    position: fixed; top: 0; left: 0; right: 0; z-index: 900;
    background: rgba(250,247,242,0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    height: 68px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .logo {
    display: flex; align-items: center; gap: 10px; text-decoration: none;
  }
  .logo-icon {
    width: 38px; height: 38px; background: var(--teal);
    border-radius: 10px; display: flex; align-items: center; justify-content: center;
    font-family: 'Playfair Display', serif; font-size: 20px; color: var(--gold-light);
    font-weight: 900;
  }
  .logo-text {
    font-family: 'Playfair Display', serif;
    font-size: 22px; font-weight: 900; color: var(--ink);
    letter-spacing: -0.5px;
  }
  .logo-tag { font-size: 11px; color: var(--muted); font-weight: 400; margin-top: -2px; }
  .header-right { display: flex; align-items: center; gap: 16px; }
  .nav-cta {
    background: var(--teal); color: #fff;
    padding: 9px 20px; border-radius: 8px;
    font-size: 14px; font-weight: 600; text-decoration: none;
    transition: background 0.2s;
  }
  .nav-cta:hover { background: var(--teal-light); }

  /* ===== HERO ===== */
  .hero {
    margin-top: 68px;
    position: relative; height: calc(100vh - 68px); min-height: 520px;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  .hero-bg {
    position: absolute; inset: 0;
    background-image: url('https://i.ibb.co/Cp76c8g0/Gemini-Generated-Image-qlxc7zqlxc7zqlxc.png');
    background-size: cover; background-position: center;
    transform: scale(1.04);
    transition: transform 8s ease;
  }
  .hero:hover .hero-bg { transform: scale(1); }
  .hero-overlay {
    position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(13,13,13,0.72) 0%, rgba(26,107,107,0.45) 100%);
  }
  .hero-content {
    position: relative; z-index: 2;
    text-align: center; padding: 24px;
    max-width: 720px;
  }
  .hero-badge {
    display: inline-block;
    background: rgba(201,147,58,0.25);
    border: 1px solid var(--gold-light);
    color: var(--gold-light);
    font-size: 12px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase;
    padding: 6px 18px; border-radius: 100px;
    margin-bottom: 24px;
    animation: fadeUp 0.7s ease both;
  }
  .hero h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(36px, 7vw, 76px);
    font-weight: 900; color: #fff;
    line-height: 1.08; letter-spacing: -1px;
    margin-bottom: 20px;
    animation: fadeUp 0.7s 0.1s ease both;
  }
  .hero h1 em { color: var(--gold-light); font-style: normal; }
  .hero p {
    font-size: clamp(15px, 2.5vw, 19px);
    color: rgba(255,255,255,0.82);
    margin-bottom: 36px; line-height: 1.6;
    animation: fadeUp 0.7s 0.2s ease both;
  }
  .hero-btns {
    display: flex; gap: 14px; justify-content: center; flex-wrap: wrap;
    animation: fadeUp 0.7s 0.3s ease both;
  }
  .btn-primary {
    background: var(--gold); color: #fff;
    padding: 15px 34px; border-radius: 10px;
    font-size: 16px; font-weight: 700; text-decoration: none;
    transition: all 0.25s; border: none; cursor: pointer;
    box-shadow: 0 4px 18px rgba(201,147,58,0.4);
  }
  .btn-primary:hover { background: var(--gold-light); transform: translateY(-2px); box-shadow: 0 8px 28px rgba(201,147,58,0.5); }
  .btn-secondary {
    background: rgba(255,255,255,0.12); color: #fff;
    padding: 15px 34px; border-radius: 10px;
    font-size: 16px; font-weight: 600; text-decoration: none;
    border: 1.5px solid rgba(255,255,255,0.35);
    transition: all 0.25s; backdrop-filter: blur(8px);
  }
  .btn-secondary:hover { background: rgba(255,255,255,0.2); }
  .hero-scroll {
    position: absolute; bottom: 28px; left: 50%; transform: translateX(-50%);
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    color: rgba(255,255,255,0.5); font-size: 12px; letter-spacing: 1px; z-index: 2;
    animation: bounce 2s infinite;
  }
  .hero-scroll span { width: 1px; height: 40px; background: rgba(255,255,255,0.3); }
  @keyframes bounce { 0%,100%{transform:translateX(-50%) translateY(0)} 50%{transform:translateX(-50%) translateY(8px)} }
  @keyframes fadeUp { from{opacity:0;transform:translateY(28px)} to{opacity:1;transform:translateY(0)} }

  /* ===== STATS BAR ===== */
  .stats-bar {
    background: var(--teal); color: #fff;
    display: flex; justify-content: center; gap: 0; flex-wrap: wrap;
  }
  .stat-item {
    padding: 20px 36px; text-align: center;
    border-right: 1px solid rgba(255,255,255,0.15);
  }
  .stat-item:last-child { border-right: none; }
  .stat-num { font-family: 'Playfair Display', serif; font-size: 28px; font-weight: 900; color: var(--gold-light); }
  .stat-label { font-size: 12px; opacity: 0.75; margin-top: 2px; }

  /* ===== SECTION WRAPPER ===== */
  .section { padding: 80px 24px; }
  .section-header { text-align: center; margin-bottom: 52px; }
  .section-badge {
    display: inline-block;
    font-size: 11px; font-weight: 700; letter-spacing: 2.5px; text-transform: uppercase;
    color: var(--teal); background: rgba(26,107,107,0.1);
    padding: 5px 16px; border-radius: 100px; margin-bottom: 14px;
  }
  .section-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(28px, 5vw, 46px); font-weight: 900;
    line-height: 1.15; letter-spacing: -0.5px;
  }
  .section-sub { font-size: 16px; color: var(--muted); margin-top: 12px; max-width: 540px; margin-left: auto; margin-right: auto; line-height: 1.6; }

  /* ===== COURSES GRID ===== */
  #courses { background: var(--cream); }
  .filter-row {
    display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-bottom: 40px;
  }
  .filter-btn {
    padding: 9px 20px; border-radius: 100px;
    border: 1.5px solid var(--border); background: #fff;
    font-size: 13px; font-weight: 600; color: var(--muted);
    cursor: pointer; transition: all 0.2s;
  }
  .filter-btn.active, .filter-btn:hover {
    background: var(--teal); color: #fff; border-color: var(--teal);
  }
  .courses-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 28px; max-width: 1160px; margin: 0 auto;
  }
  .course-card {
    background: var(--card-bg); border-radius: 16px;
    overflow: hidden; box-shadow: var(--shadow);
    transition: all 0.3s; position: relative;
    border: 1px solid var(--border);
  }
  .course-card:hover { transform: translateY(-6px); box-shadow: var(--shadow-hover); }
  .card-img-wrap { position: relative; overflow: hidden; aspect-ratio: 16/10; }
  .card-img-wrap img {
    width: 100%; height: 100%; object-fit: cover;
    transition: transform 0.5s ease;
  }
  .course-card:hover .card-img-wrap img { transform: scale(1.06); }
  .card-badge {
    position: absolute; top: 14px; left: 14px;
    background: var(--teal); color: #fff;
    font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
    padding: 5px 12px; border-radius: 6px;
  }
  .card-badge.bestseller { background: var(--gold); }
  .card-rating {
    position: absolute; top: 14px; right: 14px;
    background: rgba(0,0,0,0.55); color: #fff;
    font-size: 12px; font-weight: 600;
    padding: 4px 10px; border-radius: 6px; backdrop-filter: blur(4px);
  }
  .card-body { padding: 22px; }
  .card-category { font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--teal); margin-bottom: 8px; }
  .card-title { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 700; line-height: 1.3; margin-bottom: 10px; }
  .card-desc { font-size: 13.5px; color: var(--muted); line-height: 1.55; margin-bottom: 16px; }
  .card-meta { display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 18px; }
  .meta-item { font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 5px; }
  .meta-icon { font-size: 14px; }
  .card-footer { display: flex; align-items: center; justify-content: space-between; padding-top: 16px; border-top: 1px solid var(--border); }
  .card-price { font-family: 'Playfair Display', serif; font-size: 24px; font-weight: 900; color: var(--ink); }
  .card-price span { font-size: 13px; color: var(--muted); text-decoration: line-through; font-family: 'DM Sans', sans-serif; font-weight: 400; margin-left: 6px; }
  .enroll-btn {
    background: var(--teal); color: #fff;
    padding: 11px 22px; border-radius: 9px;
    font-size: 14px; font-weight: 700; border: none; cursor: pointer;
    transition: all 0.2s; text-decoration: none; display: inline-flex; align-items: center; gap: 6px;
  }
  .enroll-btn:hover { background: var(--teal-light); transform: scale(1.04); }

  /* ===== WHY US ===== */
  #why { background: var(--ink); color: #fff; }
  #why .section-title { color: #fff; }
  #why .section-badge { color: var(--gold-light); background: rgba(201,147,58,0.15); }
  .features-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 24px; max-width: 1040px; margin: 0 auto;
  }
  .feature-card {
    background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 14px; padding: 28px 24px;
    transition: all 0.3s;
  }
  .feature-card:hover { background: rgba(255,255,255,0.09); transform: translateY(-4px); }
  .feature-icon { font-size: 36px; margin-bottom: 16px; }
  .feature-title { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 700; margin-bottom: 10px; color: var(--gold-light); }
  .feature-desc { font-size: 14px; color: rgba(255,255,255,0.65); line-height: 1.6; }

  /* ===== TESTIMONIALS ===== */
  #testimonials { background: #fff; }
  .testi-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 24px; max-width: 960px; margin: 0 auto;
  }
  .testi-card {
    background: var(--cream); border-radius: 14px; padding: 28px 24px;
    border: 1px solid var(--border); position: relative;
  }
  .testi-quote { font-size: 52px; color: var(--teal); opacity: 0.15; line-height: 1; margin-bottom: -12px; font-family: Georgia, serif; }
  .testi-text { font-size: 15px; line-height: 1.65; color: var(--ink); margin-bottom: 20px; }
  .testi-author { display: flex; align-items: center; gap: 12px; }
  .testi-avatar {
    width: 44px; height: 44px; border-radius: 50%;
    background: var(--teal); display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 18px; color: var(--gold-light);
  }
  .testi-name { font-weight: 700; font-size: 14px; }
  .testi-role { font-size: 12px; color: var(--muted); }
  .testi-stars { color: var(--gold); font-size: 13px; margin-bottom: 4px; }

  /* ===== ENROLLMENT MODAL ===== */
  .modal-overlay {
    display: none; position: fixed; inset: 0; z-index: 1000;
    background: rgba(13,13,13,0.7); backdrop-filter: blur(6px);
    align-items: center; justify-content: center;
    padding: 20px;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: #fff; border-radius: 20px;
    padding: 0; max-width: 520px; width: 100%;
    max-height: 90vh; overflow-y: auto;
    box-shadow: 0 24px 80px rgba(0,0,0,0.25);
    animation: modalIn 0.3s ease;
  }
  @keyframes modalIn { from{opacity:0;transform:scale(0.92) translateY(20px)} to{opacity:1;transform:scale(1) translateY(0)} }
  .modal-header {
    background: linear-gradient(135deg, var(--teal), var(--teal-light));
    padding: 28px 32px 24px; border-radius: 20px 20px 0 0; position: relative;
  }
  .modal-close {
    position: absolute; top: 18px; right: 18px;
    background: rgba(255,255,255,0.2); border: none; color: #fff;
    width: 32px; height: 32px; border-radius: 50%;
    font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: background 0.2s;
  }
  .modal-close:hover { background: rgba(255,255,255,0.35); }
  .modal-course-badge { font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--gold-light); margin-bottom: 8px; }
  .modal-title { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 900; color: #fff; line-height: 1.25; }
  .modal-price { font-size: 28px; font-weight: 900; color: var(--gold-light); margin-top: 10px; font-family: 'Playfair Display', serif; }
  .modal-body { padding: 28px 32px 32px; }
  .form-row { margin-bottom: 18px; }
  label { display: block; font-size: 13px; font-weight: 600; color: var(--ink); margin-bottom: 6px; }
  label span { color: var(--accent); }
  input, select, textarea {
    width: 100%; padding: 12px 16px;
    border: 1.5px solid var(--border); border-radius: 9px;
    font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--ink);
    background: var(--cream); transition: border-color 0.2s, box-shadow 0.2s;
    outline: none;
  }
  input:focus, select:focus, textarea:focus {
    border-color: var(--teal); box-shadow: 0 0 0 3px rgba(26,107,107,0.1);
  }
  textarea { resize: vertical; min-height: 80px; }
  .submit-btn {
    width: 100%; padding: 15px;
    background: var(--teal); color: #fff;
    border: none; border-radius: 10px;
    font-size: 16px; font-weight: 700; cursor: pointer;
    transition: all 0.25s; font-family: 'DM Sans', sans-serif;
    margin-top: 8px; display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .submit-btn:hover { background: var(--teal-light); transform: translateY(-2px); }
  .submit-btn:active { transform: translateY(0); }
  .form-note { font-size: 12px; color: var(--muted); text-align: center; margin-top: 12px; }

  /* ===== SUCCESS STATE ===== */
  .success-box {
    display: none; text-align: center; padding: 16px;
  }
  .success-box.show { display: block; }
  .success-icon { font-size: 64px; margin-bottom: 16px; }
  .success-title { font-family: 'Playfair Display', serif; font-size: 26px; font-weight: 900; margin-bottom: 10px; color: var(--teal); }
  .success-text { font-size: 15px; color: var(--muted); line-height: 1.6; margin-bottom: 24px; }
  .wa-btn {
    display: inline-flex; align-items: center; gap: 10px;
    background: #25D366; color: #fff;
    padding: 14px 28px; border-radius: 10px;
    font-size: 15px; font-weight: 700; text-decoration: none;
    transition: all 0.2s;
  }
  .wa-btn:hover { background: #20ba58; transform: scale(1.04); }

  /* ===== CONTACT ===== */
  #contact { background: var(--cream); }
  .contact-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 48px; max-width: 900px; margin: 0 auto; align-items: center;
  }
  @media(max-width:680px){ .contact-grid{grid-template-columns:1fr;} }
  .contact-info h3 { font-family: 'Playfair Display', serif; font-size: 26px; font-weight: 900; margin-bottom: 16px; }
  .contact-item { display: flex; align-items: flex-start; gap: 14px; margin-bottom: 18px; }
  .contact-icon { font-size: 22px; margin-top: 2px; }
  .contact-label { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); }
  .contact-val { font-size: 15px; font-weight: 600; color: var(--ink); margin-top: 2px; }
  .contact-val a { color: var(--teal); text-decoration: none; }
  .contact-val a:hover { text-decoration: underline; }

  /* ===== FOOTER ===== */
  footer {
    background: var(--ink); color: rgba(255,255,255,0.65);
    text-align: center; padding: 36px 24px;
    font-size: 13.5px; line-height: 1.8;
  }
  footer strong { color: #fff; }
  footer a { color: var(--gold-light); text-decoration: none; }

  /* ===== FLOATING WHATSAPP ===== */
  .wa-float {
    position: fixed; bottom: 28px; right: 28px; z-index: 800;
    background: #25D366; color: #fff;
    width: 58px; height: 58px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 28px; text-decoration: none;
    box-shadow: 0 4px 20px rgba(37,211,102,0.45);
    transition: all 0.25s;
    animation: waPulse 3s infinite;
  }
  .wa-float:hover { transform: scale(1.12); box-shadow: 0 8px 32px rgba(37,211,102,0.6); }
  @keyframes waPulse {
    0%,100%{box-shadow:0 4px 20px rgba(37,211,102,0.45)}
    50%{box-shadow:0 4px 36px rgba(37,211,102,0.75)}
  }
  .wa-tooltip {
    position: absolute; right: 70px; white-space: nowrap;
    background: rgba(0,0,0,0.8); color: #fff;
    font-size: 12px; font-weight: 600;
    padding: 6px 12px; border-radius: 6px; opacity: 0;
    pointer-events: none; transition: opacity 0.2s;
  }
  .wa-float:hover .wa-tooltip { opacity: 1; }

  /* ===== RESPONSIVE ===== */
  @media(max-width:600px){
    .stat-item{padding:16px 20px;}
    .hero-btns{flex-direction:column;align-items:center;}
    .btn-primary,.btn-secondary{width:100%;max-width:280px;text-align:center;}
    .modal-header,.modal-body{padding:22px 20px;}
  }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <a class="logo" href="#">
    <div class="logo-icon">C</div>
    <div>
      <div class="logo-text">Coursaga</div>
      <div class="logo-tag">Learn. Grow. Succeed.</div>
    </div>
  </a>
  <div class="header-right">
    <a href="#courses" class="nav-cta">Browse Courses</a>
  </div>
</header>

<!-- HERO -->
<section class="hero">
  <div class="hero-bg"></div>
  <div class="hero-overlay"></div>
  <div class="hero-content">
    <div class="hero-badge">✦ Transform Your Career Today</div>
    <h1>Learn Skills That <em>Actually</em> Pay</h1>
    <p>Expert-led courses designed for real-world success. Join thousands of learners who've transformed their careers with Coursaga.</p>
    <div class="hero-btns">
      <a href="#courses" class="btn-primary">🎓 Go to Courses</a>
      <a href="#why" class="btn-secondary">Why Coursaga?</a>
    </div>
  </div>
  <div class="hero-scroll">SCROLL<span></span></div>
</section>

<!-- STATS -->
<div class="stats-bar">
  <div class="stat-item"><div class="stat-num">2,400+</div><div class="stat-label">Students Enrolled</div></div>
  <div class="stat-item"><div class="stat-num">15+</div><div class="stat-label">Expert Courses</div></div>
  <div class="stat-item"><div class="stat-num">4.9★</div><div class="stat-label">Average Rating</div></div>
  <div class="stat-item"><div class="stat-num">100%</div><div class="stat-label">Online & Flexible</div></div>
</div>

<!-- COURSES -->
<section class="section" id="courses">
  <div class="section-header">
    <div class="section-badge">📚 Our Courses</div>
    <h2 class="section-title">Choose Your Learning Path</h2>
    <p class="section-sub">Handpicked programs built to give you job-ready skills — learn at your own pace, from anywhere.</p>
  </div>
  <div class="filter-row" id="filter-row">
    <button class="filter-btn active" onclick="filterCourses('all', this)">All Courses</button>
    <button class="filter-btn" onclick="filterCourses('tech', this)">Tech & Coding</button>
    <button class="filter-btn" onclick="filterCourses('business', this)">Business</button>
    <button class="filter-btn" onclick="filterCourses('design', this)">Design</button>
    <button class="filter-btn" onclick="filterCourses('marketing', this)">Marketing</button>
  </div>
  <div class="courses-grid" id="courses-grid"></div>
</section>

<!-- WHY COURSAGA -->
<section class="section" id="why">
  <div class="section-header">
    <div class="section-badge">✦ Why Choose Us</div>
    <h2 class="section-title">Learning That Works for You</h2>
    <p class="section-sub" style="color:rgba(255,255,255,0.6)">We're committed to delivering education that's accessible, affordable, and actually effective.</p>
  </div>
  <div class="features-grid">
    <div class="feature-card">
      <div class="feature-icon">🎯</div>
      <div class="feature-title">Focused Curriculum</div>
      <div class="feature-desc">No fluff. Every lesson is crafted to get you from zero to job-ready in the shortest time possible.</div>
    </div>
    <div class="feature-card">
      <div class="feature-icon">📱</div>
      <div class="feature-title">Learn Anywhere</div>
      <div class="feature-desc">Access your course materials on any device, any time. Your learning fits around your life — not the other way round.</div>
    </div>
